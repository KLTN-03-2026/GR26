## ============================================================
## SmartF&B — Cấu hình chính ứng dụng
## Java 21 + Spring Boot 3.3 + PostgreSQL 16
## ============================================================

spring:
  application:
    name: smartfnb

  ## ------ JPA & Hibernate ------
  jpa:
    hibernate:
      # ddl-auto: validate # Flyway quản lý schema, Hibernate chỉ validate
      ddl-auto: none # Flyway quản lý schema; none để tránh validate bảng AI Service read-only
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        globally_quoted_identifiers: false
    open-in-view: false # Tắt OSIV — tránh N+1 ẩn

  ## ------ DataSource (PostgreSQL 16) ------
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:smartfnb}
    username: ${DB_USER:smartfnb}
    password: ${DB_PASS:smartfnb123}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: SmartFnbHikariPool

  ## ------ Redis Configuration ------
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      database: 0
      repositories:
          enabled: false
  ## ------ Flyway Migration ------
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
    repair-on-migrate: true   # Tự động xóa record failed trước khi retry migration

  ## ------ Thread Pool (Java 21 Virtual Threads) ------
  threads:
    virtual:
      enabled: true # Tomcat dùng Virtual Threads

  ## ------ Multipart File Upload ------
  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB       # Giới hạn mỗi file ảnh
      max-request-size: 10MB   # Giới hạn toàn bộ request

## ------ Server ------
server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /
  compression:
    enabled: true

## ------ JWT Configuration ------
jwt:
  secret: ${JWT_SECRET:SmartFnbSuperSecretKey2026ChangeInProduction!@#$%^&*()}
  expiration-ms: ${JWT_EXPIRATION_MS:3600000} # 1 giờ
  refresh-expiration-ms: ${JWT_REFRESH_MS:604800000} # 7 ngày

## ------ Logging ------
logging:
  level:
    com.smartfnb: DEBUG
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

## ------ SpringDoc / Swagger ------
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
  show-actuator: false

## ------ Actuator ------
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: when-authorized

## ------ File Storage (Local Filesystem) ------
## Swap sang S3/MinIO: thêm implementation bean và đổi config bên dưới
app:
  storage:
    upload-dir: ${UPLOAD_DIR:./uploads}         # Mount volume trong Docker
    base-url: ${BASE_URL:http://localhost:8080}  # Base URL trả về trong response
## ------ AI Service Integration ------                                                                                                                  
## AI Service (Python FastAPI) chạy riêng ở port 8001                                                                                                    
## BE chỉ gọi AI Service để trigger train/predict — forecast đọc từ DB                                                                                   
ai:                                                                                                                                                      
  service:                                                                                                                                               
    url: ${AI_SERVICE_URL:http://localhost:8001}                                                                                                         
    timeout:                                                                                                                                             
      connect: ${AI_CONNECT_TIMEOUT_MS:5000}                                                                                                             
      read: ${AI_READ_TIMEOUT_MS:10000}                                                                                                                  

## ------ PayOS Payment Gateway ------
## author: Hoàng | date: 27-04-2026
## note: Config tích hợp cổng thanh toán PayOS qua SDK chính thức (vn.payos:payos-java).
##       PAYOS_CLIENT_ID / PAYOS_API_KEY / PAYOS_CHECKSUM_KEY: lấy từ dashboard.payos.vn
##       PAYOS_ENCRYPTION_KEY: Base64 của 32 bytes ngẫu nhiên (openssl rand -base64 32)
##         → dùng để mã hoá apiKey + checksumKey trong bảng branch_payment_configs
##       PAYOS_RETURN_URL / PAYOS_CANCEL_URL: trang FE nhận kết quả sau khi thanh toán
payos:
  client-id: ${PAYOS_CLIENT_ID:your-client-id}
  api-key: ${PAYOS_API_KEY:your-api-key}
  checksum-key: ${PAYOS_CHECKSUM_KEY:your-checksum-key}
  encryption:
    ## author: Hoàng | date: 27-04-2026 | note: fallback dev decode đúng 32 bytes cho AES-256, production phải dùng secret riêng.
    secret-key: ${PAYOS_ENCRYPTION_KEY:c21hcnRmbmItZGV2LXBheW9zLWtleS0yMDI2ISEhISE=}
  return-url: ${PAYOS_RETURN_URL:http://localhost:5173/pos/payment?result=success}
  cancel-url: ${PAYOS_CANCEL_URL:http://localhost:5173/pos/payment?result=cancel}
